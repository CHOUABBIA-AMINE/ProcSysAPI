# Application Configuration
spring.application.name=HyFloAPI
server.port=8080
server.servlet.context-path=/hyflo/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ProcSys_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool Configuration
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.auto-commit=false

# HikariCP Performance Optimizations
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.useLocalSessionState=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.connection.autocommit=false
spring.jpa.open-in-view=true

# Hibernate Performance Optimizations
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.query.plan_cache_max_size=2048
spring.jpa.properties.hibernate.query.plan_parameter_metadata_max_size=128
#spring.jpa.properties.org.hibernate.tool.schema=DEBUG
#spring.jpa.properties.org.hibernate.mapping=DEBUG
#spring.jpa.properties.org.hibernate.boot.model=DEBUG

# Enable JPA auditing
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.properties.org.hibernate.envers.revision_field_name=REV
spring.jpa.properties.org.hibernate.envers.revision_type_field_name=REVTYPE

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,env,configprops,loggers
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.prometheus.metrics.export.enabled=true

# Spring Security
spring.security.require-ssl=false
spring.security.headers.frame-options=deny
spring.security.headers.content-security-policy=default-src 'self'

# JWT Configuration
jwt.secret=uT6Zq3Hw9YV8pLkR2jS5fN1cX7mB4vD0gE6hI8nJ3yM5tQ4oP9wA2zC1xK7
jwt.access.expiration=3600000
jwt.refresh.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:4200
cors.allowed.methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed.headers=*
cors.allow.credentials=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# File Storage Configuration
# Directory where uploaded files will be stored (relative to application root)
file.upload-dir=C:/uploads

# Maximum file size in bytes (default: 10MB = 10485760 bytes)
# This is enforced by the application in addition to Spring's multipart settings
file.max-size=10485760

# Allowed file extensions (comma-separated, case-insensitive)
# Only files with these extensions will be accepted
file.allowed-extensions=pdf,jpg,jpeg,png,gif,doc,docx,xls,xlsx,ppt,pptx,txt,csv,zip,rar

# Logging Configuration
logging.level.dz.sh.trc.hyflo=INFO
logging.level.org.springframework.web=INFO
#logging.level.org.hibernate=DEBUG
logging.level.org.springframework.security=INFO
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=C:/logs/iaas.log

# Jackson Configuration
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=NON_NULL

# Validation Configuration
spring.web.resources.add-mappings=false

app.file.upload-dir=f:/files

# ========================================
# OpenAPI/Swagger Configuration
# ========================================

# Enable Swagger UI
springdoc.swagger-ui.enabled=true

# Swagger UI path (accessible at: http://localhost:8080/hyflo/api/swagger-ui.html)
springdoc.swagger-ui.path=/swagger-ui.html

# API docs path (OpenAPI JSON/YAML at: http://localhost:8080/hyflo/api/api-docs)
springdoc.api-docs.path=/api-docs

# Enable API docs
springdoc.api-docs.enabled=true

# Group all APIs together
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.displayRequestDuration=true
springdoc.swagger-ui.defaultModelsExpandDepth=1
springdoc.swagger-ui.defaultModelExpandDepth=1
springdoc.swagger-ui.docExpansion=none
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.showExtensions=true
springdoc.swagger-ui.showCommonExtensions=true

# Enable try it out by default
springdoc.swagger-ui.tryItOutEnabled=true

# Disable default petstore example
springdoc.swagger-ui.disable-swagger-default-url=true

# Custom OpenAPI URLs (used in OpenAPIConfig.java)
hyflo.openapi.dev-url=http://localhost:8080/hyflo/api
hyflo.openapi.prod-url=https://api.hyflo.dz

# Package to scan for API endpoints
springdoc.packages-to-scan=dz.sh.trc.hyflo

# Paths to include
springdoc.paths-to-match=/auth/**,/system/**,/network/**,/general/**

# Enable pretty print for JSON responses
springdoc.writer-with-default-pretty-printer=true

# ============================================================================
# WEBSOCKET NOTIFICATION CONFIGURATION
# ============================================================================

# WebSocket Allowed Origins (comma-separated)
# Add all frontend application URLs that will connect to WebSocket
notification.websocket.enabled=true
notification.websocket.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8081

# ============================================================================
# NOTIFICATION CLEANUP CONFIGURATION
# ============================================================================

# Enable/disable automatic cleanup of old read notifications
notification.cleanup.enabled=true

# Cron expression for cleanup schedule
# Default: Every day at 2:00 AM
# Format: second minute hour day month weekday
notification.cleanup.cron=0 0 2 * * ?

# Number of days to keep read notifications before cleanup
# Unread notifications are never deleted
notification.cleanup.retention-days=30

# ============================================================================
# ASYNC TASK EXECUTION (for @Async event processing)
# ============================================================================

# Core pool size for async tasks
spring.task.execution.pool.core-size=5

# Maximum pool size
spring.task.execution.pool.max-size=10

# Queue capacity
spring.task.execution.pool.queue-capacity=100

# Thread name prefix for debugging
spring.task.execution.thread-name-prefix=async-notif-

# ============================================================================
# LOGGING CONFIGURATION (for notification system)
# ============================================================================

# WebSocket logging
logging.level.dz.sh.trc.hyflo.configuration.websocket=DEBUG
logging.level.dz.sh.trc.hyflo.configuration.event=INFO
logging.level.dz.sh.trc.hyflo.system.notification=INFO
